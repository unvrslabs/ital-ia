    <!-- JSON-LD FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Cos'è ITAL IA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ITAL IA è una piattaforma di intelligenza artificiale sovrana che addestra LLM proprietari sui dati aziendali del cliente. Il modello gira su un hardware Nvidia DGX Spark di proprietà del cliente, installato presso la sua sede. Nessun dato esce dal perimetro aziendale."
          }
        },
        {
          "@type": "Question",
          "name": "In cosa si differenzia da ChatGPT o altri modelli generici?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "I modelli generici inviano i tuoi dati su server esteri e offrono risposte generiche. ITAL IA addestra un modello dedicato esclusivamente sul tuo settore e sui tuoi dati, eseguito su hardware tuo, garantendo risposte precise, sicurezza totale e conformità normativa."
          }
        },
        {
          "@type": "Question",
          "name": "Quali settori supportate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Supportiamo oltre 9 settori: Energia, Industria, Servizi, Finanza, Commercio, Logistica, Sanità, Pubblica Amministrazione e PMI manifatturiere. Ogni modello è verticale e specializzato."
          }
        },
        {
          "@type": "Question",
          "name": "I miei dati sono al sicuro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Assolutamente sì. Il cliente acquista direttamente l'hardware Nvidia DGX Spark e lo tiene nella propria sede. L'intera infrastruttura è fisicamente di proprietà dell'azienda. Nessun cloud estero, nessuna API verso terzi. Piena conformità GDPR e NIS2."
          }
        },
        {
          "@type": "Question",
          "name": "Chi compra l'hardware?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'hardware Nvidia DGX Spark viene acquistato dal cliente e rimane di sua proprietà. ITAL IA si occupa della configurazione, dell'addestramento del modello e del supporto continuo. L'azienda ha il pieno controllo fisico e logico dell'infrastruttura."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo serve per essere operativi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dopo una consulenza iniziale, configuriamo e addestriamo il modello sui tuoi dati. Il sistema è operativo rapidamente, senza progetti IT complessi."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto costa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Il costo include l'acquisto dell'hardware DGX Spark da parte del cliente e il servizio di configurazione, addestramento e supporto da parte nostra. Offriamo una consulenza iniziale gratuita per valutare insieme le tue esigenze."
          }
        }
      ]
    }
